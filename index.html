<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RR Asset Management</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family: Arial, sans-serif;
  background:#000;
  overflow:hidden;
}

/* ================= BACKGROUND VIDEO ================= */
.bg{ position:fixed; inset:0; z-index:0; overflow:hidden; }
.bg video{ width:100%; height:100%; object-fit:cover; }
.bg::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.45));
}

/* ================= INTRO LOGO ================= */
.intro{
  position:fixed; inset:0; z-index:20;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
  transition:opacity .6s ease;
}
.intro img{
  width:min(240px,55vw);
  opacity:0;
  transform:translateY(10px);
  animation:logoIn 1.8s ease forwards .4s;
}
@keyframes logoIn{ to{opacity:1; transform:translateY(0);} }

/* ================= BURGER ================= */
.side-bar{
  position:fixed; top:0; left:0;
  width:80px; height:100vh;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  z-index:90;
  cursor:pointer;
}
.burger-lines i{
  width:24px;height:1.6px;background:#111;position:relative;display:block;
}
.burger-lines i::before,
.burger-lines i::after{
  content:"";position:absolute;left:0;width:24px;height:1.6px;background:#111;
}
.burger-lines i::before{top:-8px;}
.burger-lines i::after{top:8px;}

/* ================= HORIZONTAL ================= */
.hwrap{
  position:relative;
  z-index:30;
  height:100vh;
  width:100vw;
  overflow:hidden;
}
.htrack{
  height:100%;
  display:flex;
  will-change:transform;
}

.panel{
  height:100vh;
  width:100vw;
  flex:0 0 100vw;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

.panel-img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ================= FINAL CONTACT PANEL ================= */

.panel--contact{
  padding:0;
}

.contact-layout{
  display:flex;
  width:100%;
  height:100%;
}

.contact-image{
  flex:1;
}
.contact-image img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.contact-content{
  width:420px;
  background:#f4f4f2;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:60px 40px;
}

.contact-logo img{
  width:150px;
  margin-bottom:40px;
}

.contact-links a{
  display:block;
  font-family:'Cormorant Garamond', serif;
  font-size:26px;
  margin:16px 0;
  text-decoration:none;
  color:#222;
  transition:opacity .3s ease;
}
.contact-links a:hover{opacity:.6;}

.contact-divider{
  width:160px;
  height:1px;
  background:#c6b67a;
  margin:40px auto 25px auto;
}

.contact-details{
  font-family:'Cormorant Garamond', serif;
  font-size:18px;
  line-height:1.7;
  color:#222;
}
.contact-phone{margin-top:15px;}

/* ================= MENU ================= */
.menu{
  position:fixed; top:0; left:0;
  height:100vh; width:420px;
  background:#f4f4f2;
  z-index:95;
  transform:translateX(-100%);
  transition:transform .9s cubic-bezier(.77,0,.18,1);
}
.menu.open{ transform:translateX(0); }

.menu-panel{
  height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:60px 30px;
}
.menu-logo img{ width:180px; margin-bottom:50px; }

.menu-links a{
  display:block;
  font-family:'Cormorant Garamond', serif;
  font-size:30px;
  margin:18px 0;
  text-decoration:none;
  color:#222;
}

.divider{
  width:200px;height:1px;background:#c6b67a;
  margin:50px auto 30px auto;
}

.menu-footer{
  font-family:'Cormorant Garamond', serif;
  font-size:22px;
  line-height:1.6;
  color:#222;
}

body.menu-open .hwrap{pointer-events:none;}

</style>
</head>

<body>

<div class="bg">
  <video autoplay muted loop playsinline>
    <source src="./Bg.mp4" type="video/mp4">
  </video>
</div>

<div class="intro">
  <img src="./logo.png" alt="R&R Logo">
</div>

<div class="side-bar" id="burger">
  <div class="burger-lines"><i></i></div>
</div>

<div class="hwrap">
  <div class="htrack" id="track">

    <section class="panel"></section>

    <section class="panel">
      <img class="panel-img" src="./homepagefirstpics.png">
    </section>

    <section class="panel">
      <img class="panel-img" src="./homepagefirstpics.png">
    </section>

    <section class="panel panel--contact">
      <div class="contact-layout">

        <div class="contact-image">
          <img src="./homepagefirstpics.png">
        </div>

        <div class="contact-content">

          <div class="contact-logo">
            <img src="./logo.png">
          </div>

          <nav class="contact-links">
            <a href="#" data-goto="0">Home</a>
            <a href="#" data-goto="1">Expertise</a>
            <a href="#" data-goto="2">Interior Projects</a>
            <a href="#" data-goto="3">Press</a>
          </nav>

          <div class="contact-divider"></div>

          <div class="contact-details">
            SUN HOUSE, 428 LONG DRIVE,<br>
            GREENFORD, UB6 8UH
            <div class="contact-phone">
              +44 (0) 20 8575 3700
            </div>
          </div>

        </div>
      </div>
    </section>

  </div>
</div>

<div class="menu" id="menu">
  <div class="menu-panel">
    <div class="menu-logo">
      <img src="./logo.png">
    </div>

    <nav class="menu-links">
      <a href="#" data-goto="0">Home</a>
      <a href="#" data-goto="1">Expertise</a>
      <a href="https://rrasset.github.io/RRASSETMANAGEMENT/interior-projects.html" data-goto="2">Interior Projects</a>
      <a href="#" data-goto="3">Press</a>
    </nav>

    <div class="divider"></div>

    <div class="menu-footer">
      SUN HOUSE, 428 LONG DRIVE,<br>
      GREENFORD, UB6 8UH
    </div>
  </div>
</div>

<script>
const track = document.getElementById("track");
const panels = Array.from(track.querySelectorAll(".panel"));
let currentX = 0;
let targetX = 0;

function maxScroll(){ return (panels.length - 1) * window.innerWidth; }
function clamp(v,min,max){ return Math.max(min, Math.min(max,v)); }

function raf(){
  currentX += (targetX - currentX) * .08;
  track.style.transform = `translate3d(${-currentX}px,0,0)`;
  requestAnimationFrame(raf);
}
raf();

window.addEventListener("wheel",(e)=>{
  if(document.body.classList.contains("menu-open")) return;
  targetX = clamp(targetX + e.deltaY, 0, maxScroll());
},{passive:true});

document.querySelectorAll("[data-goto]").forEach(a=>{
  a.addEventListener("click",(e)=>{
    e.preventDefault();
    targetX = clamp(Number(a.dataset.goto) * window.innerWidth,0,maxScroll());
  });
});

const menu=document.getElementById("menu");
document.getElementById("burger").onclick=()=>menu.classList.add("open");
</script>

</body>
</html>
